name: Keep Supabase Alive

on:
  schedule:
    # Runs every 3 days at 08:00 UTC — well within Supabase's 7-day pause window
    - cron: '0 8 */3 * *'
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase via app endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.APP_URL }}/api/ping")
          echo "Response status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Ping failed with status $STATUS"
            exit 1
          fi
          echo "Supabase is alive"
